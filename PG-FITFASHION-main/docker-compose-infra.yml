version: '3.8'

services:
  # ==========================================
  # 1. PostgreSQL (Base de Datos Relacional)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: fitfashion-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      # Postgres crea la DB por defecto que coloquemos aquí
      POSTGRES_DB: fitfashion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fitfashion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. Redis (Base de datos en Memoria / Caché)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: fitfashion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # ==========================================
  # 3. RabbitMQ (Broker de Mensajería para Go/Node)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fitfashion-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Puerto de comunicación AMQP
      - "15672:15672" # Interfaz gráfica Management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ==========================================
  # 4. Apache Kafka (Broker para Django ms_auth)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: fitfashion-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: fitfashion-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
